<section class="section" id="committees" style="background-color: #ffffff;">
  <div class="container">
    
    <div id="committees-section-header" class="section-header reveal">
      <span class="section-eyebrow">Structure</span>
      <h2 class="section-title">Committees</h2>
      <p class="section-subtitle">Twelve specialized committees that power AYL's programs, operations, and member experience.</p>
    </div>
    
    <div id="committees-landing-view">
      <div class="officers-grid" id="committees-data-grid"></div>
      <div class="directory-btn-container" style="display: flex; justify-content: center; margin-top: 55px;">
        <button id="btn-go-committees-directory" class="btn-view-directory" style="display: inline-flex; align-items: center; gap: 12px; padding: 16px 36px; background: #2563eb; color: #fff; border: none; cursor: pointer; border-radius: 30px; font-weight: 700; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.25); transition: all 0.3s ease;">
          <i class="fas fa-layer-group"></i>
          <span>View All Committees</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>

    <div id="committees-directory-view" style="display: none;">
      <div class="officers-grid" id="all-committees-data-grid"></div>
        <div style="display: flex; justify-content: flex-end;">
          <button id="btn-back-to-committees-landing" style="background: none; border: none; color: #2563eb; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 0.95rem;">
            <i class="fas fa-arrow-left"></i> Back to Main View
          </button>
      </div>
    </div>

    <div id="committee-profile-page-view" style="display: none; animation: fadeIn 0.4s ease;">
  
    <button id="btn-exit-committee-page" style="background: #f1f5f9; border: none; padding: 10px 20px; border-radius: 20px; color: #334155; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; margin-bottom: 20px; transition: all 0.2s;">
      <i class="fas fa-arrow-left"></i> Return to Directory
    </button>

    <div id="committee-page-hero" style="background: linear-gradient(135deg, #1e3a8a, #2563eb); border-radius: 24px; padding: 24px 32px; color: #ffffff; display: flex; align-items: center; gap: 24px; margin-bottom: 24px; box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.15);">
       <div style="width: 84px; height: 84px; background: #ffffff; border-radius: 16px; padding: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);">
        <img id="committee-page-logo" src="" alt="" style="max-width: 100%; max-height: 100%; object-fit: contain;">
      </div>
     <div style="display: flex; flex-direction: column; gap: 4px; justify-content: center;">
       <h1 id="committee-page-title" style="font-family: 'Poppins', sans-serif; font-size: 1.85rem; font-weight: 800; margin: 0; padding: 0; line-height: 1.2; letter-spacing: -0.02em;"></h1>
        <p id="committee-page-subtitle" style="font-size: 0.85rem; opacity: 0.85; margin: 0; padding: 0; line-height: 1; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: #93c5fd;"></p>
      </div>
    </div>

    <div class="committee-info-split-row">
      <div style="background: #f8fafc; padding: 24px; border-radius: 20px; border: 1px solid #e2e8f0;">
       <h3 style="font-family: 'Poppins', sans-serif; font-size: 1.1rem; text-transform: uppercase; color: #1e40af; font-weight: 700; margin-top: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;"><i class="fas fa-bullseye"></i> Mission & Vision</h3>
        <p id="committee-page-mission" style="color: #475569; font-size: 0.98rem; line-height: 1.6; margin: 0;"></p>
     </div>
     <div style="background: #f8fafc; padding: 24px; border-radius: 20px; border: 1px solid #e2e8f0;">
       <h3 style="font-family: 'Poppins', sans-serif; font-size: 1.1rem; text-transform: uppercase; color: #065f46; font-weight: 700; margin-top: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;"><i class="fas fa-bullhorn"></i> Core Movements & Frameworks</h3>
        <p id="committee-page-movement" style="color: #475569; font-size: 0.98rem; line-height: 1.6; margin: 0;"></p>
     </div>
   </div>

   <div class="committee-roster-divider">
      <div class="committee-roster-header">
       <h3 style="font-family: 'Poppins', sans-serif; font-size: 1.6rem; font-weight: 800; color: #0f172a; margin: 0;">Committee Roster</h3>
       <p style="color: #64748b; font-size: 0.95rem; margin: 4px 0 0 0;">The executing officers behind this specialized sector.</p>
     </div>
    
     <div class="officers-grid" id="committee-page-officers-grid"></div>
    </div>

  </div>
</section>
