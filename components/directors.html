<section class="section" id="directors" style="background-color: #f8fafc;">
  <div class="container">
    
    <div class="section-header reveal">
      <span class="section-eyebrow">Departments</span>
      <h2 class="section-title">National Directors</h2>
      <p class="section-subtitle">The strategic directors leading AYL's specialized committees and national programs.</p>
    </div>
    
    <div id="directors-landing-view">
      <div class="officers-grid" id="directors-data-grid"></div>

      <div class="directory-btn-container" style="display: flex; justify-content: center; margin-top: 55px;">
        <button id="btn-go-directors-directory" class="btn-view-directory" style="display: inline-flex; align-items: center; gap: 12px; padding: 16px 36px; background: #2563eb; color: #fff; border: none; cursor: pointer; border-radius: 30px; font-weight: 700; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.25); transition: all 0.3s ease;">
          <i class="fas fa-folder-open"></i>
          <span>View All Directors</span>
          <i class="fas fa-arrow-right" style="transition: transform 0.2s ease;"></i>
        </button>
      </div>
    </div>

    <div id="directors-directory-view" style="display: none; margin-top: 20px;">
      <div style="margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #e2e8f0; padding-bottom: 16px;">
        <h3 style="font-family: 'Poppins', sans-serif; font-size: 1.5rem; font-weight: 800; color: #0c0f12; margin: 0;">Full Directors Directory</h3>
      </div>
      
      <div class="officers-grid" id="all-directors-data-grid"></div>
        <div style="display: flex; justify-content: flex-end;">
          <button id="btn-back-to-directors-landing" style="background: none; border: none; color: #2563eb; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 0.95rem;">
            <i class="fas fa-arrow-left"></i> Back to Main View
          </button>
        </div>
    </div>

  </div>
</section>
